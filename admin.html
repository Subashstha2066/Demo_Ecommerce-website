<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — NepStack</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="admin-login-page" id="admin-login-page">
  <div class="admin-login-card">
    <h1>NepStack Admin</h1>
    <p style="color:#999;font-size:13px;text-align:center;margin-bottom:20px;">Enter credentials to continue</p>
    <form id="admin-login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="admin-email" placeholder="admin@nepstack.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="admin-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;">Login</button>
      <p id="login-error" style="color:#f5222d;text-align:center;font-size:13px;margin-top:12px;display:none;"></p>
    </form>
    <p style="text-align:center;font-size:12px;color:#999;margin-top:16px;">Default: admin@nepstack.com / nepstack123</p>
  </div>
</div>

<div class="admin-page" id="admin-dashboard" style="display:none;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <h1 style="font-size:22px;font-weight:700;">Dashboard</h1>
    <button class="btn btn-outline btn-sm" id="admin-logout-btn">Logout</button>
  </div>
  <div class="admin-stats">
    <div class="stat-card"><h3>Total Products</h3><div class="stat-value" id="stat-products">1000</div></div>
    <div class="stat-card"><h3>Total Orders</h3><div class="stat-value" id="stat-orders">0</div></div>
    <div class="stat-card"><h3>Pending Orders</h3><div class="stat-value" id="stat-pending">0</div></div>
  </div>
  <div class="admin-tabs">
    <button class="admin-tab active" id="tab-products">Products</button>
    <button class="admin-tab" id="tab-orders">Orders</button>
  </div>
  <div id="section-products">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="font-size:16px;font-weight:600;">Products</h3>
      <button class="btn btn-primary btn-sm" id="btn-add-product">+ Add Product</button>
    </div>
    <div style="margin-bottom:12px;">
      <input type="text" class="form-input" id="product-search" placeholder="Search products..." style="max-width:300px;">
    </div>
    <table class="admin-table">
      <thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Actions</th></tr></thead>
      <tbody id="products-tbody"></tbody>
    </table>
    <div class="pagination" id="product-pagination" style="margin-top:16px;"></div>
  </div>
  <div id="section-orders" style="display:none;">
    <h3 style="font-size:16px;font-weight:600;margin-bottom:16px;">Orders</h3>
    <div id="orders-empty" style="text-align:center;padding:60px;color:#999;display:none;">No orders yet.</div>
    <table class="admin-table" id="orders-table">
      <thead><tr><th>Order ID</th><th>Customer</th><th>Phone</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th></tr></thead>
      <tbody id="orders-tbody"></tbody>
    </table>
  </div>
</div>

<!-- Product Modal -->
<div class="modal-overlay" id="product-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Add Product</h2>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <form id="product-form">
        <input type="hidden" id="pf-id">
        <div class="form-group"><label class="form-label">Product Name</label><input type="text" class="form-input" id="pf-name" required></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Price (Rs.)</label><input type="number" class="form-input" id="pf-price" required></div>
          <div class="form-group"><label class="form-label">Original Price</label><input type="number" class="form-input" id="pf-original-price"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Category</label>
            <select class="form-input" id="pf-category" required>
              <option>Tshirts</option><option>Hoodies</option><option>Pants</option><option>Jackets</option>
              <option>Caps</option><option>Bags</option><option>Shoes</option><option>Accessories</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">Stock</label><input type="number" class="form-input" id="pf-stock" value="10" required></div>
        </div>
        <div class="form-group"><label class="form-label">Description</label><textarea class="form-input" id="pf-description" rows="3"></textarea></div>
        <div class="form-group"><label class="form-label">Sizes (comma separated)</label><input type="text" class="form-input" id="pf-sizes" placeholder="S, M, L, XL"></div>
        <div class="form-group"><label class="form-label">Image URL</label><input type="text" class="form-input" id="pf-image" placeholder="https://..."></div>
        <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:20px;">
          <button type="button" class="btn btn-outline" id="btn-cancel-modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Product</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="products.js"></script>
<script src="firebase-config.js"></script>
<script>
if (localStorage.getItem('nepstack_admin') === '1') showDashboard();

document.getElementById('admin-login-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var email = document.getElementById('admin-email').value.trim();
  var pass = document.getElementById('admin-password').value;
  var err = document.getElementById('login-error');
  if (email === 'admin@nepstack.com' && pass === 'nepstack123') {
    localStorage.setItem('nepstack_admin', '1');
    showDashboard();
  } else {
    err.textContent = 'Invalid email or password.';
    err.style.display = 'block';
  }
});

document.getElementById('admin-logout-btn').addEventListener('click', function() {
  localStorage.removeItem('nepstack_admin');
  document.getElementById('admin-dashboard').style.display = 'none';
  document.getElementById('admin-login-page').style.display = 'flex';
});

function showDashboard() {
  document.getElementById('admin-login-page').style.display = 'none';
  document.getElementById('admin-dashboard').style.display = 'block';
  loadProducts();
  loadOrders();
}

var productPage = 1;
var filteredProds = [];

function getAllProducts() {
  var custom = JSON.parse(localStorage.getItem('nepstack_custom_products')||'[]');
  return custom.concat(products);
}

function loadProducts(search) {
  filteredProds = getAllProducts();
  if (search) filteredProds = filteredProds.filter(function(p){return p.name.toLowerCase().includes(search.toLowerCase())||p.category.toLowerCase().includes(search.toLowerCase());});
  document.getElementById('stat-products').textContent = filteredProds.length;
  renderProductPage();
}

function renderProductPage() {
  var perPage = 20;
  var start = (productPage-1)*perPage;
  var paged = filteredProds.slice(start, start+perPage);
  var tbody = document.getElementById('products-tbody');
  tbody.innerHTML = paged.map(function(p) {
    return '<tr>'
      +'<td><img src="'+p.image+'" style="width:40px;height:40px;object-fit:cover;border-radius:4px;"></td>'
      +'<td><strong>'+p.name+'</strong></td>'
      +'<td>'+p.category+'</td>'
      +'<td>Rs. '+p.price.toLocaleString()+'</td>'
      +'<td>'+p.stock+'</td>'
      +'<td><div class="admin-actions">'
      +'<button class="btn btn-outline btn-sm" onclick="openEditModal('+p.id+')">Edit</button>'
      +'<button class="btn btn-danger btn-sm" onclick="deleteProduct('+p.id+', \''+p.name.replace(/'/g,"\\'")+ '\')">Delete</button>'
      +'</div></td></tr>';
  }).join('');

  var totalPages = Math.ceil(filteredProds.length/perPage);
  var pag = document.getElementById('product-pagination');
  pag.innerHTML = '';
  for (var i=1;i<=Math.min(totalPages,10);i++) {
    (function(i){
      var btn=document.createElement('button');
      btn.className='page-btn'+(i===productPage?' active':'');
      btn.textContent=i;
      btn.onclick=function(){productPage=i;renderProductPage();};
      pag.appendChild(btn);
    })(i);
  }
}

document.getElementById('product-search').addEventListener('input', function(e){productPage=1;loadProducts(e.target.value);});

document.getElementById('btn-add-product').addEventListener('click', function(){
  document.getElementById('modal-title').textContent='Add Product';
  document.getElementById('product-form').reset();
  document.getElementById('pf-id').value='';
  document.getElementById('product-modal').classList.add('active');
});
document.getElementById('modal-close').addEventListener('click', function(){document.getElementById('product-modal').classList.remove('active');});
document.getElementById('btn-cancel-modal').addEventListener('click', function(){document.getElementById('product-modal').classList.remove('active');});

function openEditModal(id) {
  var p = getAllProducts().find(function(x){return x.id===id;});
  if (!p) return;
  document.getElementById('modal-title').textContent='Edit Product';
  document.getElementById('pf-id').value=p.id;
  document.getElementById('pf-name').value=p.name;
  document.getElementById('pf-price').value=p.price;
  document.getElementById('pf-original-price').value=p.originalPrice||'';
  document.getElementById('pf-category').value=p.category;
  document.getElementById('pf-stock').value=p.stock;
  document.getElementById('pf-description').value=p.description||'';
  document.getElementById('pf-sizes').value=(p.sizes||[]).join(', ');
  document.getElementById('pf-image').value=p.image||'';
  document.getElementById('product-modal').classList.add('active');
}

document.getElementById('product-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var id = document.getElementById('pf-id').value;
  var custom = JSON.parse(localStorage.getItem('nepstack_custom_products')||'[]');
  var price = Number(document.getElementById('pf-price').value);
  var origPrice = Number(document.getElementById('pf-original-price').value)||0;
  var newP = {
    id: id ? Number(id) : Date.now(),
    name: document.getElementById('pf-name').value.trim(),
    price: price,
    originalPrice: origPrice||Math.round(price*1.2),
    discount: origPrice>0?Math.round((1-price/origPrice)*100):20,
    category: document.getElementById('pf-category').value,
    stock: Number(document.getElementById('pf-stock').value),
    description: document.getElementById('pf-description').value.trim(),
    sizes: document.getElementById('pf-sizes').value.split(',').map(function(s){return s.trim();}).filter(Boolean),
    colors: ['Black'], badge: null, rating: 4.5, sold: 0,
    featured: false, flashSale: false,
    image: document.getElementById('pf-image').value.trim()||'https://picsum.photos/400/400?random='+Date.now()
  };
  if (id) {
    var idx=custom.findIndex(function(p){return p.id===Number(id);});
    if (idx>=0) custom[idx]=newP; else custom.unshift(newP);
  } else { custom.unshift(newP); }
  localStorage.setItem('nepstack_custom_products', JSON.stringify(custom));
  document.getElementById('product-modal').classList.remove('active');
  loadProducts();
  showToast(id?'Product updated!':'Product added!', 'success');
});

function deleteProduct(id, name) {
  if (!confirm('Delete "'+name+'"?')) return;
  var custom=JSON.parse(localStorage.getItem('nepstack_custom_products')||'[]');
  localStorage.setItem('nepstack_custom_products', JSON.stringify(custom.filter(function(p){return p.id!==id;})));
  loadProducts();
  showToast('Deleted', 'success');
}

function loadOrders() {
  var orders = JSON.parse(localStorage.getItem('nepstack_orders')||'[]');
  document.getElementById('stat-orders').textContent = orders.length;
  document.getElementById('stat-pending').textContent = orders.filter(function(o){return o.status==='Pending';}).length;
  if (orders.length===0) {
    document.getElementById('orders-empty').style.display='block';
    document.getElementById('orders-table').style.display='none';
    return;
  }
  document.getElementById('orders-empty').style.display='none';
  document.getElementById('orders-table').style.display='table';
  document.getElementById('orders-tbody').innerHTML = orders.map(function(o) {
    var items=(o.items||[]).map(function(i){return i.name+' ×'+i.quantity;}).join(', ');
    var date=new Date(o.createdAt).toLocaleDateString();
    return '<tr>'
      +'<td><strong>#'+o.id+'</strong></td>'
      +'<td>'+o.customerName+'</td>'
      +'<td>'+o.phone+'</td>'
      +'<td style="max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="'+items+'">'+items+'</td>'
      +'<td><strong>Rs. '+o.total.toLocaleString()+'</strong></td>'
      +'<td><select class="form-input" onchange="updateStatus(\''+o.id+'\',this.value)" style="padding:4px 8px;font-size:12px;">'
      +'<option'+(o.status==='Pending'?' selected':'')+'>Pending</option>'
      +'<option'+(o.status==='Confirmed'?' selected':'')+'>Confirmed</option>'
      +'<option'+(o.status==='Shipped'?' selected':'')+'>Shipped</option>'
      +'<option'+(o.status==='Delivered'?' selected':'')+'>Delivered</option>'
      +'</select></td>'
      +'<td>'+date+'</td></tr>';
  }).join('');
}

function updateStatus(orderId, status) {
  var orders=JSON.parse(localStorage.getItem('nepstack_orders')||'[]');
  var o=orders.find(function(x){return x.id===orderId;});
  if(o){o.status=status;localStorage.setItem('nepstack_orders',JSON.stringify(orders));document.getElementById('stat-pending').textContent=orders.filter(function(x){return x.status==='Pending';}).length;}
}

document.querySelectorAll('.admin-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.admin-tab').forEach(function(t){t.classList.remove('active');});
    tab.classList.add('active');
    document.getElementById('section-products').style.display=tab.id==='tab-products'?'block':'none';
    document.getElementById('section-orders').style.display=tab.id==='tab-orders'?'block':'none';
  });
});
</script>
</body>
</html>
